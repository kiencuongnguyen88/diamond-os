name: Apply Action Library Minimal v0.1

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-action-library-v0_1.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: action-library-v0-1-apply
  cancel-in-progress: false

jobs:
  apply-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Materialize approved candidate
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, gzip, hashlib

          payloads = {
              "learning-game-seed/index.html": "",
              "learning-game-seed/cloud.html": ""
          }
          expected = {
              "learning-game-seed/index.html": "5eee5b78e9756d71fccea0db72bc6413455efc702596c2208bfc9e15a8d6a416",
              "learning-game-seed/cloud.html": "5c274b7f3a74bee995b5f909755413c103966b66e6ed43394c3f7defbf76d778"
          }
          for path, payload in payloads.items():
              raw = gzip.decompress(base64.b64decode(payload))
              actual = hashlib.sha256(raw).hexdigest()
              if actual != expected[path]:
                  raise SystemExit(f"SHA mismatch for {path}: {actual}")
              Path(path).write_bytes(raw)
              print(path, len(raw), actual)
          PY

      - name: Remove one-time workflow and commit approved candidate
        shell: bash
        run: |
          rm -f .github/workflows/apply-action-library-v0_1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add learning-game-seed/index.html learning-game-seed/cloud.html .github/workflows/apply-action-library-v0_1.yml
          git diff --cached --check
          git commit -m "feat(learning-game): add Action Library Minimal v0.1"
          git push origin HEAD:main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: learning-game-seed

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
