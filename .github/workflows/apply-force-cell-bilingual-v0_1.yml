name: Apply Force Cell Bilingual Surface v0.1

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "learning-game-seed/.force-cell-bilingual-trigger"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: force-cell-bilingual-v0-1
  cancel-in-progress: false

jobs:
  apply-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify baseline and reconstruct approved candidate
        shell: bash
        run: |
          set -euo pipefail

          expected_base_index="69de1fb99235f39bb3f7c8d001c94e643b37c9338052f69c554fddf4d127f8d7"
          expected_base_force="bc9026c26cfeaff635e0343fb4d5cf04ed02ff5e5a01c7a88c5e908a5fcc82fe"
          expected_new_index="9ebb32ab9e40818d39dfc076f0f0d8e6bf41d389139880e03f4601924ba580a8"
          expected_new_force="6e6bf1c97ae66c95023294dc520b65ead65de63d71c40d1de74cf7fe619b286f"

          actual_base_index="$(sha256sum learning-game-seed/index.html | awk '{print $1}')"
          actual_base_force="$(sha256sum learning-game-seed/force-cells-drc03-v0_1.js | awk '{print $1}')"
          echo "BASE_INDEX_SHA256=$actual_base_index"
          echo "BASE_FORCE_SHA256=$actual_base_force"
          test "$actual_base_index" = "$expected_base_index"
          test "$actual_base_force" = "$expected_base_force"

          tmp="$(mktemp -d)"
          cat .github/force-cell-bilingual-v0_1/index.part* | base64 -d > "$tmp/index.html.gz"
          cat .github/force-cell-bilingual-v0_1/force.part* | base64 -d > "$tmp/force.js.gz"
          echo "INDEX_PAYLOAD_BYTES=$(wc -c < "$tmp/index.html.gz")"
          echo "FORCE_PAYLOAD_BYTES=$(wc -c < "$tmp/force.js.gz")"
          gzip -t "$tmp/index.html.gz"
          gzip -t "$tmp/force.js.gz"
          gzip -dc "$tmp/index.html.gz" > "$tmp/index.html"
          gzip -dc "$tmp/force.js.gz" > "$tmp/force-cells-drc03-v0_1.js"

          actual_new_index="$(sha256sum "$tmp/index.html" | awk '{print $1}')"
          actual_new_force="$(sha256sum "$tmp/force-cells-drc03-v0_1.js" | awk '{print $1}')"
          echo "CANDIDATE_INDEX_SHA256=$actual_new_index"
          echo "CANDIDATE_FORCE_SHA256=$actual_new_force"
          test "$actual_new_index" = "$expected_new_index"
          test "$actual_new_force" = "$expected_new_force"

          cp "$tmp/index.html" learning-game-seed/index.html
          cp "$tmp/force-cells-drc03-v0_1.js" learning-game-seed/force-cells-drc03-v0_1.js

      - name: Commit exact bilingual candidate and remove temporary files
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .github/force-cell-bilingual-v0_1
          rm -f .github/workflows/apply-force-cell-bilingual-v0_1.yml
          rm -f learning-game-seed/.force-cell-bilingual-trigger
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(learning-game): add bilingual Force Cell surface"
          git push origin main

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: learning-game-seed

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
