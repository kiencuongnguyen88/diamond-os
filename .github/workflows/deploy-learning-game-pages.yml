name: Deploy Learning Game Seed to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "learning-game-seed/**"
      - ".github/workflows/deploy-learning-game-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: learning-game-pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: learning-game-seed
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
