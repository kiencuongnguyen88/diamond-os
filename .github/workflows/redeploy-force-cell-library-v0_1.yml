name: Redeploy Force Cell Library v0.1

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/redeploy-force-cell-library-v0_1.yml"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: force-cell-library-v0-1-redeploy
  cancel-in-progress: false

jobs:
  deploy-and-clean:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Verify Force Cell files
        shell: bash
        run: |
          set -euo pipefail
          test "$(sha256sum learning-game-seed/index.html | awk '{print $1}')" = "69de1fb99235f39bb3f7c8d001c94e643b37c9338052f69c554fddf4d127f8d7"
          test "$(sha256sum learning-game-seed/force-cells-drc03-v0_1.js | awk '{print $1}')" = "bc9026c26cfeaff635e0343fb4d5cf04ed02ff5e5a01c7a88c5e908a5fcc82fe"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: learning-game-seed

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Remove one-time workflow
        if: success()
        shell: bash
        run: |
          rm -f .github/workflows/redeploy-force-cell-library-v0_1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(learning-game): remove one-time Force Cell redeploy workflow"
          git push origin main
