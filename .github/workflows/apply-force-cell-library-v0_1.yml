name: Apply Force Cell Library Minimal v0.1

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/apply-force-cell-library-v0_1.yml"

permissions:
  contents: write

concurrency:
  group: force-cell-library-v0-1-apply
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Reconstruct and verify approved candidate
        shell: bash
        run: |
          set -euo pipefail
          baseline=$(sha256sum learning-game-seed/index.html | awk '{print $1}')
          test "$baseline" = "5eee5b78e9756d71fccea0db72bc6413455efc702596c2208bfc9e15a8d6a416"
          cat .github/force-cell-library-v0_1/index.part* | base64 -d | gzip -d > learning-game-seed/index.html
          cat .github/force-cell-library-v0_1/force.part* | base64 -d | gzip -d > learning-game-seed/force-cells-drc03-v0_1.js
          test "$(sha256sum learning-game-seed/index.html | awk '{print $1}')" = "69de1fb99235f39bb3f7c8d001c94e643b37c9338052f69c554fddf4d127f8d7"
          test "$(sha256sum learning-game-seed/force-cells-drc03-v0_1.js | awk '{print $1}')" = "bc9026c26cfeaff635e0343fb4d5cf04ed02ff5e5a01c7a88c5e908a5fcc82fe"

      - name: Commit approved files and clean staging payload
        shell: bash
        run: |
          rm -rf .github/force-cell-library-v0_1
          rm -f .github/workflows/apply-force-cell-library-v0_1.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(learning-game): add DRC03 Force Cells to Action Library"
          git push origin main
